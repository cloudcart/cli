name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      - name: Publish @cloudcart/cli-kit
        run: cd packages/cli-kit && npm publish --access public --provenance

      - name: Publish @cloudcart/app
        run: cd packages/app && npm publish --access public --provenance

      - name: Publish @cloudcart/theme
        run: cd packages/theme && npm publish --access public --provenance

      - name: Publish @cloudcart/cli
        run: cd packages/cli && npm publish --access public --ignore-scripts --provenance

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(curl -sL "https://registry.npmjs.org/@cloudcart/cli/-/cli-${VERSION}.tgz" | shasum -a 256 | cut -d' ' -f1)

          # Clone tap repo
          git clone https://x-access-token:${GH_TOKEN}@github.com/cloudcart/homebrew-tap.git /tmp/tap
          cd /tmp/tap

          # Update formula
          cat > Formula/cloudcart.rb << FORMULA
          class Cloudcart < Formula
            desc "AI-first developer CLI for managing CloudCart e-commerce stores"
            homepage "https://github.com/cloudcart/cli"
            url "https://registry.npmjs.org/@cloudcart/cli/-/cli-${VERSION}.tgz"
            sha256 "${SHA256}"
            license "MIT"

            depends_on "node@22"

            def install
              system "npm", "install", *std_npm_args
              bin.install_symlink libexec/"bin/cloudcart"
            end

            test do
              assert_match "cloudcart", shell_output("#{bin}/cloudcart --version")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/cloudcart.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cloudcart.rb
          git commit -m "Update cloudcart to ${VERSION}"
          git push
